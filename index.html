<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Livin' Ledger - Easy Multi User</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');

        :root {
            --mandiri-blue: #002d62;    
            --mandiri-gold: #fdb813;    
            --bg-light: #f4f6f9;        
            --text-dark: #1e293b;       
            --text-muted: #64748b;     
            --color-income: #22c55e;    
            --color-expense: #ef4444;   
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-light);
            color: var(--text-dark);
            margin: 0; padding: 0;
            display: flex; justify-content: center;
        }

        .app-container {
            width: 100%; max-width: 480px; 
            background-color: #ffffff; min-height: 100vh;
            box-sizing: border-box; padding-bottom: 90px; 
            position: relative; box-shadow: 0 0 20px rgba(0,0,0,0.05);
        }

        /* Layar Login Simpel */
        .activation-screen {
            position: fixed; top: 0; left: 50%; transform: translateX(-50%);
            width: 100%; max-width: 480px; height: 100vh;
            background: var(--mandiri-blue); color: white;
            z-index: 9999; display: flex; flex-direction: column;
            justify-content: center; padding: 40px; box-sizing: border-box;
            transition: all 0.5s ease;
        }
        .activation-screen.hidden { opacity: 0; pointer-events: none; transform: translate(-50%, -50px); }
        .activation-header h2 { font-weight: 800; font-size: 2.2rem; color: var(--mandiri-gold); margin: 0 0 10px 0; }
        .activation-header p { margin: 0 0 40px 0; opacity: 0.8; font-size: 0.95rem; line-height: 1.5; }

        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; font-size: 0.85rem; margin-bottom: 8px; font-weight: 600; color: #cbd5e1; }
        .app-container .input-group label { color: var(--text-muted); }
        
        input, select {
            width: 100%; padding: 14px; 
            border: 1px solid #cbd5e1; border-radius: 10px;
            background: #f8fafc; font-size: 0.95rem; color: var(--text-dark);
            box-sizing: border-box; outline: none; font-family: 'Plus Jakarta Sans', sans-serif;
        }
        .activation-screen input { background: white; border: none; color: var(--text-dark); }

        .btn-primary {
            width: 100%; padding: 14px; background: var(--mandiri-gold);
            color: var(--mandiri-blue); border: none; border-radius: 10px;
            font-size: 1rem; font-weight: 700; cursor: pointer; margin-top: 10px;
        }
        .btn-logout {
            background: none; border: 1px solid #ef4444; color: #ef4444;
            padding: 5px 10px; border-radius: 6px; font-size: 0.75rem; font-weight: 600; cursor: pointer;
        }

        /* UI Utama Aplikasi */
        .top-navbar {
            background-color: var(--mandiri-blue); padding: 20px;
            display: flex; justify-content: space-between; align-items: center; color: white;
        }
        .top-navbar .greeting h3 { margin: 3px 0 0 0; font-size: 1.1rem; font-weight: 700; }

        .rekening-card {
            background: linear-gradient(135deg, #003a80 0%, #00234d 100%);
            margin: 20px; padding: 25px; border-radius: 16px; color: white;
            box-shadow: 0 10px 20px rgba(0, 45, 98, 0.2);
        }
        .rekening-card .balance { font-size: 2.1rem; font-weight: 800; margin: 10px 0 20px 0; }
        
        .flow-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .flow-box { background: rgba(255, 255, 255, 0.1); padding: 12px; border-radius: 10px; }
        .flow-box p { margin: 0; font-size: 0.75rem; opacity: 0.7; }
        .flow-box h4 { margin: 5px 0 0 0; font-size: 1rem; font-weight: 600; }
        .flow-box.in h4 { color: #4ade80; }
        .flow-box.out h4 { color: #fca5a5; }

        .content-section { padding: 0 20px; }
        .section-title { font-size: 1rem; font-weight: 700; margin: 25px 0 15px 0; color: var(--mandiri-blue); }
        .form-panel { background: #ffffff; border: 1px solid #e2e8f0; border-radius: 14px; padding: 20px; }
        
        .btn-submit {
            width: 100%; padding: 14px; background: var(--mandiri-blue);
            color: white; border: none; border-radius: 10px; font-size: 1rem; font-weight: 700; cursor: pointer;
        }

        .mutasi-list { display: flex; flex-direction: column; gap: 12px; }
        .mutasi-card {
            display: flex; justify-content: space-between; align-items: center;
            background: #ffffff; padding: 16px; border-radius: 12px; border: 1px solid #f1f5f9;
        }
        .mutasi-info h4 { margin: 0 0 4px 0; font-size: 0.9rem; font-weight: 600; }
        .mutasi-info p { margin: 0; color: var(--text-muted); font-size: 0.75rem; }
        .mutasi-amount { font-weight: 700; font-size: 0.95rem; text-align: right; }
        .mutasi-amount.income { color: var(--color-income); }
        .mutasi-amount.expense { color: var(--color-expense); }
        .btn-delete { background: none; border: none; color: #ef4444; font-size: 0.75rem; cursor: pointer; margin-top: 6px; font-weight: 600; padding: 0;}

        /* Popup Notification */
        .popup-notification {
            position: fixed; top: -100px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 430px; background: #ffffff; border-left: 5px solid var(--mandiri-gold);
            box-shadow: 0 15px 30px rgba(0, 45, 98, 0.15); border-radius: 12px; padding: 16px; z-index: 99999;
            display: flex; align-items: center; justify-content: space-between; transition: top 0.4s ease;
        }
        .popup-notification.show { top: 20px; }
        .popup-text h5 { margin: 0 0 2px 0; font-size: 0.9rem; color: var(--mandiri-blue); }
        .popup-text p { margin: 0; font-size: 0.75rem; color: var(--text-muted); }
        .popup-close { background: none; border: none; color: #cbd5e1; font-size: 1.2rem; cursor: pointer; }
    </style>
</head>
<body>

    <!-- Layar Login Simpel -->
    <div class="activation-screen" id="activationScreen">
        <div class="activation-header">
            <h2>Selamat Datang</h2>
            <p>Masukkan Nama Pengguna Anda untuk mulai mencatat keuangan secara mandiri tanpa tercampur.</p>
        </div>

        <div class="input-group">
            <label>Nama Pengguna / Panggilan (Tanpa Spasi)</label>
            <input type="text" id="usernameInput" placeholder="Contoh: budi, roni, siska" required>
        </div>
        <button class="btn-primary" onclick="handleLogin()">Masuk Ke Aplikasi</button>
    </div>

    <!-- Notifikasi Pop-up -->
    <div class="popup-notification" id="popupNotif">
        <div style="display:flex; align-items:center; gap:12px;">
            <div style="font-size:1.5rem">🔔</div>
            <div class="popup-text">
                <h5 id="popTitle">Sistem Berhasil</h5>
                <p id="popDesc">Transaksi disimpan.</p>
            </div>
        </div>
        <button class="popup-close" onclick="closeNotification()">×</button>
    </div>

    <!-- Aplikasi Utama -->
    <div class="app-container">
        <div class="top-navbar">
            <div class="greeting">
                <h3 id="userGreeting">Hai, Nasabah</h3>
            </div>
            <button class="btn-logout" onclick="handleLogout()">Ganti Akun</button>
        </div>

        <div class="rekening-card">
            <div style="font-size:0.85rem; opacity:0.8;">Tabungan Utama (IDR)</div>
            <div class="balance" id="totalBalance">Rp 0</div>
            
            <div class="flow-grid">
                <div class="flow-box in">
                    <p>Total Masuk</p>
                    <h4 id="totalIncome">Rp 0</h4>
                </div>
                <div class="flow-box out">
                    <p>Total Keluar</p>
                    <h4 id="totalExpense">Rp 0</h4>
                </div>
            </div>
        </div>

        <div class="content-section">
            <div class="section-title">Menu Transaksi</div>
            <div class="form-panel">
                <div class="input-group">
                    <label>Jenis Mutasi</label>
                    <select id="type" onchange="updateCategories()">
                        <option value="pengeluaran">Dana Keluar (Pengeluaran)</option>
                        <option value="pemasukan">Dana Masuk (Pemasukan)</option>
                    </select>
                </div>
                <div class="input-group">
                    <label>Kategori</label>
                    <select id="category"></select>
                </div>
                <div class="input-group">
                    <label>Jumlah (Rupiah)</label>
                    <input type="number" id="amount" placeholder="Masukkan nominal Rp" required>
                </div>
                <div class="input-group">
                    <label>Catatan / Keterangan</label>
                    <input type="text" id="note" placeholder="Contoh: Beli makan siang">
                </div>
                <button class="btn-submit" onclick="addTransaction()">Simpan Transaksi</button>
            </div>
        </div>

        <div class="content-section" style="margin-top: 10px;">
            <div class="section-title">Mutasi Rekening Terbaru</div>
            <div class="mutasi-list" id="transactionList"></div>
        </div>
    </div>

    <script>
        // Menggunakan URL Web App Google Script Anda secara langsung
        const BACKEND_URL = "https://script.google.com/macros/s/AKfycbz_BA5uAcADYinDhAchjAMMav1iwBSqGG94SjmQ-m7gDtbetu1n1rZv79VdrzdzaEg0yw/exec";

        let currentUsername = localStorage.getItem('app_username') || "";
        let transactions = JSON.parse(localStorage.getItem('keuangan_data_' + currentUsername)) || [];

        const categories = {
            pengeluaran: ["Makanan & Minuman", "Transportasi", "Belanja", "Tagihan Bulanan", "Hiburan", "Lain-lain"],
            pemasukan: ["Gaji Utama", "Bonus & Project", "Investasi", "Lain-lain"]
        };

        const formatRupiah = (angka) => {
            return "Rp " + new Intl.NumberFormat('id-ID').format(angka);
        };

        function checkLogin() {
            const screen = document.getElementById('activationScreen');
            if (currentUsername) {
                screen.classList.add('hidden');
                document.getElementById('userGreeting').innerText = "Hai, " + currentUsername.toUpperCase();
                transactions = JSON.parse(localStorage.getItem('keuangan_data_' + currentUsername)) || [];
            } else {
                screen.classList.remove('hidden');
            }
        }

        function handleLogin() {
            const user = document.getElementById('usernameInput').value.trim().replace(/\s+/g, '').toLowerCase();
            if(!user) {
                alert("Masukkan nama Anda terlebih dahulu.");
                return;
            }
            localStorage.setItem('app_username', user);
            currentUsername = user;
            checkLogin();
            updateUI();
            showNotification("Berhasil Masuk", "Selamat datang di ruang pencatatan Anda, " + user);
        }

        function handleLogout() {
            if(confirm("Apakah Anda ingin ganti akun atau keluar?")) {
                localStorage.removeItem('app_username');
                currentUsername = "";
                checkLogin();
                updateUI();
            }
        }

        function updateCategories() {
            const type = document.getElementById('type').value;
            const categorySelect = document.getElementById('category');
            categorySelect.innerHTML = '';
            categories[type].forEach(cat => {
                let option = document.createElement('option');
                option.value = cat; option.text = cat;
                categorySelect.appendChild(option);
            });
        }

        let notifTimeout;
        function showNotification(title, message) {
            const popNotif = document.getElementById('popupNotif');
            document.getElementById('popTitle').innerText = title;
            document.getElementById('popDesc').innerText = message;
            popNotif.classList.add('show');
            clearTimeout(notifTimeout);
            notifTimeout = setTimeout(() => { closeNotification(); }, 4000);
        }

        function closeNotification() { document.getElementById('popupNotif').classList.remove('show'); }

        function addTransaction() {
            const type = document.getElementById('type').value;
            const category = document.getElementById('category').value;
            const amount = parseFloat(document.getElementById('amount').value);
            const note = document.getElementById('note').value;
            const date = new Date().toLocaleDateString('id-ID', {day: 'numeric', month: 'short', year: 'numeric'});

            if (!amount || amount <= 0) {
                alert("Harap masukkan nominal rupiah yang benar.");
                return;
            }

            const newTx = { id: Date.now(), type, category, amount, note, date };

            // Kirim ke backend dengan membawa nama pengguna (username)
            fetch(BACKEND_URL, {
                method: "POST",
                body: JSON.stringify({...newTx, username: currentUsername, action: "INSERT"}),
                mode: "no-cors"
            }).catch(err => console.error("Cloud Error:", err));

            transactions.unshift(newTx);
            localStorage.setItem('keuangan_data_' + currentUsername, JSON.stringify(transactions));
            updateUI();
            
            showNotification(`Sukses!`, `Transaksi sebesar ${formatRupiah(amount)} berhasil disimpan.`);
            document.getElementById('amount').value = '';
            document.getElementById('note').value = '';
        }

        function deleteTransaction(id) {
            if(confirm("Hapus transaksi ini?")) {
                const txToDelete = transactions.find(tx => tx.id === id);
                if (txToDelete) {
                    fetch(BACKEND_URL, {
                        method: "POST",
                        body: JSON.stringify({
                            action: "DELETE",
                            username: currentUsername,
                            id: txToDelete.id
                        }),
                        mode: "no-cors"
                    }).catch(err => console.error("Cloud Error:", err));
                }

                transactions = transactions.filter(tx => tx.id !== id);
                localStorage.setItem('keuangan_data_' + currentUsername, JSON.stringify(transactions));
                updateUI();
                showNotification("Terhapus", "Data mutasi telah dibersihkan.");
            }
        }

        function updateUI() {
            let totalIn = 0; let totalOut = 0;
            const listContainer = document.getElementById('transactionList');
            listContainer.innerHTML = '';

            if(transactions.length === 0) {
                listContainer.innerHTML = `<p style="color: var(--text-muted); text-align: center; margin-top: 20px; font-size: 0.85rem;">Belum ada riwayat transaksi.</p>`;
            }

            transactions.forEach(tx => {
                if (tx.type === 'pemasukan') totalIn += tx.amount;
                else totalOut += tx.amount;

                const isIncome = tx.type === 'pemasukan';
                const sign = isIncome ? '+' : '-';
                const colorClass = isIncome ? 'income' : 'expense';

                const card = document.createElement('div');
                card.className = 'mutasi-card';
                card.innerHTML = `
                    <div class="mutasi-info">
                        <h4>${tx.category}</h4>
                        <p>${tx.date} ${tx.note ? '• ' + tx.note : ''}</p>
                    </div>
                    <div style="text-align: right;">
                        <div class="mutasi-amount ${colorClass}">${sign} ${formatRupiah(tx.amount)}</div>
                        <button class="btn-delete" onclick="deleteTransaction(${tx.id})">Hapus</button>
                    </div>
                `;
                listContainer.appendChild(card);
            });

            const balance = totalIn - totalOut;
            document.getElementById('totalBalance').innerText = formatRupiah(balance);
            document.getElementById('totalIncome').innerText = formatRupiah(totalIn);
            document.getElementById('totalExpense').innerText = formatRupiah(totalOut);
        }

        checkLogin();
        updateCategories();
        updateUI();
    </script>
</body>
</html>
